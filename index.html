<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SĐB AI Tool</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Override CSS cho phiên bản Web App chạy trên Vercel */
        :root {
            --bg-body: linear-gradient(135deg, #00e5ff 0%, #1de9b6 100%);
            /* Màu xanh lơ tuyệt đẹp */
            --bg-container: rgba(255, 255, 255, 0.95);
            --text-main: #333;
            --text-label: #555;
            --bg-input: #fff;
            --border-input: #ccc;
            --text-input: #000;
            --bg-textarea: #eee;
            --line-title: #0056b3;
            --shadow-box: rgba(0, 0, 0, 0.15);
            --btn-theme-bg: #fff;
            --btn-theme-text: #333;
            --copyright-text: #555;
            --status-text: #333;
        }

        body.dark-mode {
            --bg-body: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            /* Xanh tối / Xám sâu */
            --bg-container: rgba(30, 34, 43, 0.95);
            --text-main: #f0f0f0;
            --text-label: #bbb;
            --bg-input: #2a2d35;
            --border-input: #555;
            --text-input: #fff;
            --bg-textarea: #2a2d35;
            --line-title: #00e5ff;
            --shadow-box: rgba(0, 0, 0, 0.6);
            --btn-theme-bg: #2a2d35;
            --btn-theme-text: #00e5ff;
            --copyright-text: #aaa;
            --status-text: #fff;
        }

        body {
            width: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-body) !important;
            color: var(--text-main);
            transition: background 0.5s ease;
        }

        .container {
            width: 500px;
            /* Làm khung to hơn bản tiện ích */
            max-width: 90%;
            background: var(--bg-container) !important;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px var(--shadow-box) !important;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        h2 {
            font-size: 22px;
            margin-bottom: 25px;
            color: var(--text-main) !important;
            border-bottom-color: var(--line-title) !important;
        }

        label {
            font-size: 15px;
            color: var(--text-label) !important;
        }

        input[type="text"],
        input[type="password"],
        input[type="file"] {
            font-size: 15px;
            padding: 10px;
            width: calc(100% - 22px);
            margin-bottom: 10px;
            background-color: var(--bg-input) !important;
            color: var(--text-input) !important;
            border-color: var(--border-input) !important;
        }

        textarea {
            background-color: var(--bg-textarea) !important;
            color: var(--status-text) !important;
            border-color: var(--border-input) !important;
        }

        .copyright {
            margin-top: 25px;
            font-size: 14px;
            color: var(--copyright-text) !important;
        }

        #themeToggleBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 18px;
            border-radius: 20px;
            background: var(--btn-theme-bg);
            color: var(--btn-theme-text);
            box-shadow: 0 4px 10px var(--shadow-box);
            border: none;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        #themeToggleBtn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <!-- Nút Dark Mode -->
    <button id="themeToggleBtn">🌙 Chế độ Tối</button>

    <!-- Login Section -->
    <div class="container" id="loginSection">
        <h2>Đăng nhập sử dụng TK SĐB AI</h2>
        <div class="form-group">
            <label for="loginEmail">Email đăng nhập:</label>
            <input type="text" id="loginEmail" placeholder="Nhập địa chỉ email...">
        </div>
        <div class="form-group">
            <label for="loginPassword">Mật khẩu:</label>
            <input type="password" id="loginPassword" placeholder="Nhập mật khẩu...">
        </div>
        <button id="loginBtn" class="primary">Đăng Nhập</button>
        <button id="showRegisterBtn" class="secondary">Chưa có tài khoản? Đăng ký</button>
        <div class="status-box">
            <label>Trạng thái:</label>
            <textarea id="loginStatusArea" readonly rows="2">Vui lòng đăng nhập...</textarea>
        </div>
    </div>

    <!-- Register Section -->
    <div class="container" id="registerSection" style="display: none;">
        <h2>Đăng Ký Tài Khoản</h2>
        <div class="form-group">
            <label for="regEmail">Email:</label>
            <input type="text" id="regEmail" placeholder="Nhập email...">
        </div>
        <div class="form-group">
            <label for="regPassword">Mật khẩu:</label>
            <input type="password" id="regPassword" placeholder="Nhập mật khẩu...">
        </div>
        <div class="form-group">
            <label for="regRepassword">Nhắc lại mật khẩu:</label>
            <input type="password" id="regRepassword" placeholder="Nhập lại mật khẩu...">
        </div>
        <button id="registerBtn" class="primary">Đăng Ký</button>
        <button id="showLoginBtn" class="secondary">Đã có tài khoản? Đăng nhập ngay</button>
        <div class="status-box">
            <label>Trạng thái:</label>
            <textarea id="regStatusArea" readonly rows="2">Vui lòng nhập thông tin...</textarea>
        </div>
    </div>

    <!-- Main App Section -->
    <div class="container" id="mainSection" style="display: none;">
        <div id="loggedInUserDisplay"
            style="text-align: right; font-size: 12px; font-weight: bold; color: #555; margin-bottom: 5px; padding-bottom: 5px; border-bottom: 1px dashed #ccc;">
        </div>
        <h2>Thống Kê SĐB - AI TKB</h2>

        <div class="form-group">
            <label for="apiKey">Gemini 2.5 Flash API Key:</label>
            <input type="password" id="apiKey" placeholder="Nhập API Key vào đây...">
            <button id="saveKeyBtn">Lưu Key</button>
        </div>

        <div class="form-group">
            <label for="excelFile">1. Tải lên File Excel Thiếu tiết:</label>
            <input type="file" id="excelFile" accept=".xlsx, .xls">
        </div>

        <div class="form-group">
            <label for="pdfFile">2. Tải lên File TKB (PDF hoặc Excel):</label>
            <input type="file" id="pdfFile" accept="application/pdf, .xlsx, .xls">
        </div>

        <div class="actions">
            <button id="processBtn" class="primary">Bắt đầu Tích hợp & Xuất Excel</button>
            <button id="logoutBtn"
                style="background-color: #dc3545; color: white; display: block; margin-top: 10px;">Đăng Xuất</button>
        </div>

        <div class="status-box">
            <label>Trạng thái:</label>
            <textarea id="statusArea" readonly rows="5">Chưa bắt đầu...</textarea>
        </div>
    </div>

    <div class="copyright" style="text-align: center; margin-top: 15px; font-size: 13px; color: #555;">
        Made by Nguyễn Phi Hùng <br>
        <span style="color: #0056b3; font-weight: bold;">Zalo 0938750424</span>
    </div>

    <!-- Include local scripts for extension compatibility -->
    <script src="pdf.min.js"></script>
    <script src="xlsx.full.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
